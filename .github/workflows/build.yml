name: Build & Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install UPX
        run: choco install upx -y

      - name: Compress PowerRun
        run: upx --best utils/PowerRun.exe

      - name: Build frontend
        working-directory: frontend
        run: npm install && npm run build

      - name: Build Windows exe
        run: |
          wails build -tags webkit2_41 -o OptiWin-${{ github.ref_name }}.exe -ldflags="-s -w" -trimpath

      - name: Compress exe
        run: upx --ultra-brute build/bin/OptiWin-${{ github.ref_name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptiWin-${{ github.ref_name }}
          path: build/bin/OptiWin-${{ github.ref_name }}.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: OptiWin-${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: OptiWin-${{ github.ref_name }}.exe
          generate_release_notes: true
